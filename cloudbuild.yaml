# cloudbuild.yaml — reetle-facebook-poster
substitutions:
  _PROJECT_ID: lect-io
  _REGION: us-central1
  _AR_HOST: us-docker.pkg.dev
  _AR_REPO: lect-io-containers
  _IMAGE_NAME: reetle-facebook-poster
  _SERVICE: reetle-facebook-poster

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1) Build container with two tags (injecting GITHUB_TOKEN for private repo access)
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg GITHUB_TOKEN=$$GITHUB_TOKEN \
          -t ${_AR_HOST}/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA} \
          -t ${_AR_HOST}/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest \
          .
    secretEnv: ['GITHUB_TOKEN']

  # 2) Push both tags
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_AR_HOST}/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}']

  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_AR_HOST}/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest']

  # 3) Update existing Cloud Run Job to latest image
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run jobs update ${_SERVICE} \
          --region=${_REGION} \
          --image=${_AR_HOST}/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/GITHUB_TOKEN/versions/latest
      env: 'GITHUB_TOKEN'
